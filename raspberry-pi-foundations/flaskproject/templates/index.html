<!DOCTYPE html>
<html>
  <head>
    <title>LED Control</title>
  </head>
  <body>
    <h1>LED Control Panel</h1>
    <h2>LED 1</h2>
    <form method="POST" action="/control">
      <input type="hidden" name="led" value="1">
      <button name="action" value="on">On</button>
      <button name="action" value="off">Off</button>
      <button name="action" value="blink">Blink</button>
    </form>

    </form>

    </form>
    <h2>Settings</h2>
    <form method="POST" action="/control">
      <input type="number" name="rate" value="500">
      <label for="rate">LED blink rate (ms)</label>
      <button name="action" value="updateRate">Update</button>
    </form>
  </body>
</html>
